<div *ngIf="!loading" class="loader-div">
	<mat-spinner></mat-spinner>
</div>
<div class="container-fluid" id="account">
	<div class="row" style="padding-top: 80px;" *ngIf="loading">
		<div class="account-body">
			<app-subheader [title]="title"></app-subheader>
			<!--
			<div class="forward_button">
				<button
					routerLink="/myaccount"
					mat-raised-button
					color="primary">
					<i class="fa fa-chevron-left"></i> Retour
				</button>
			</div>
			-->
			<!-- <div class="col-md-12 my-10" style="margin-left: 20px;">
				<button
					routerLink="/myaccount"
					mat-raised-button
					color="primary">
					<i class="fa fa-chevron-left"></i>  Retour
				</button>
			</div>
			<h1 class="subheader" style="font-family: var(--ff-candara)">La liste de mes
				offres d'emploi</h1> -->
			<div class="col-md-12 account-content" style="padding-top: 40px;">

				<div class="tableFixHead w-100">
					<table class="table table-striped table-hover table-bordered">
						<thead class="thead-light">
							<tr>
								<th>N°</th>
								<th>Titre</th>
								<th>Secteur</th>
								<th>Lieu</th>
								<th>Date de publication</th>
							</tr>
						</thead>
						<tbody>
							<tr
								*ngFor="let objectOffer of offres; let i=index"
								[routerLink]="['/detail_offer/' + objectOffer.offre.id]">
								<td>{{i + 1}}</td>
								<td class="titreO" [innerHTML]="objectOffer.offre.titre"></td>
								<td>{{objectOffer.offre.secteur}}</td>
								<td>{{objectOffer.offre.pays}}</td>
								<td>{{objectOffer.offre.publicationDate | date:'shortDate':'UTC':'fr'}}</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>
